[project]
name = "istota-browse"
version = "0.1.0"
description = "Web browsing skill for Istota"
requires-python = ">=3.11"
dependencies = ["httpx>=0.26.0"]

[project.entry-points."istota.skills"]
browse = "istota_browse"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/istota_browse"]
